name: Security

on:
  push:
    branches: [main, "feat/**", "fix/**", "chore/**"]
  pull_request:
    branches: [main]
  schedule:
    # Run every Monday at 08:00 UTC — catch new CVEs on unchanged code
    - cron: "0 8 * * 1"

jobs:
  audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dev deps
        run: uv sync --extra dev

      - name: Run pip-audit
        # Exits non-zero if ANY known vulnerability is found in dependencies
        run: uv run pip-audit

  sast:
    name: SAST (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dev deps
        run: uv sync --extra dev

      - name: Run bandit
        run: uv run bandit -r src/ -c pyproject.toml -ll --exit-zero
        # -ll = report MEDIUM and HIGH only
        # --exit-zero = don't fail CI, report only (upgrade to exit 1 when baseline is clean)

      - name: Run bandit (fail on HIGH)
        run: uv run bandit -r src/ -c pyproject.toml --severity-level high
        # Fails CI only on HIGH severity issues

  container-scan:
    name: Container scan (Trivy)
    runs-on: ubuntu-latest
    # Only on PRs and main pushes (not weekly cron — image rebuild not scheduled)
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Build image for scanning
        run: docker build --platform linux/amd64 -t shoot-ai:scan .

      - name: Run Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "shoot-ai:scan"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL"
        # Fail CI on CRITICAL CVEs only — MEDIUM/HIGH logged but don't block
