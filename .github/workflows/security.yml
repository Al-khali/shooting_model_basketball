name: Security

on:
  push:
    branches: [main, "feat/**", "fix/**", "chore/**"]
  pull_request:
    branches: [main]
  schedule:
    # Run every Monday at 08:00 UTC — catch new CVEs on unchanged code
    - cron: "0 8 * * 1"

jobs:
  audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dev deps
        run: uv sync --extra dev

      - name: Run pip-audit
        # Exits non-zero if ANY known vulnerability is found in dependencies
        run: uv run pip-audit

  sast:
    name: SAST (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dev deps
        run: uv sync --extra dev

      - name: Run bandit
        run: uv run bandit -r src/ -c pyproject.toml -ll --exit-zero
        # -ll = report MEDIUM and HIGH only
        # --exit-zero = don't fail CI, report only (upgrade to exit 1 when baseline is clean)

      - name: Run bandit (fail on HIGH)
        run: uv run bandit -r src/ -c pyproject.toml --severity-level high
        # Fails CI only on HIGH severity issues
