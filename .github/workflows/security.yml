name: Security

on:
  push:
    branches: [main, "feat/**", "fix/**", "chore/**"]
  pull_request:
    branches: [main]
  schedule:
    # Run every Monday at 08:00 UTC — catch new CVEs on unchanged code
    - cron: "0 8 * * 1"

jobs:
  audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dev deps
        run: uv sync --extra dev

      - name: Run pip-audit
        # Exits non-zero if ANY known vulnerability is found in dependencies
        run: uv run pip-audit

  sast:
    name: SAST (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dev deps
        run: uv sync --extra dev

      - name: Run bandit
        run: uv run bandit -r src/ -c pyproject.toml -ll --exit-zero
        # -ll = report MEDIUM and HIGH only
        # --exit-zero = don't fail CI, report only (upgrade to exit 1 when baseline is clean)

      - name: Run bandit (fail on HIGH)
        run: uv run bandit -r src/ -c pyproject.toml --severity-level high
        # Fails CI only on HIGH severity issues

  container-scan:
    name: Container scan (Trivy)
    runs-on: ubuntu-latest
    # Runs on push, PR, and weekly cron — the cron is exactly when new CVEs are
    # found in unchanged images (OS base, transitive lib updates upstream).
    permissions:
      contents: read
      security-events: write # Upload SARIF to GitHub Security tab
    steps:
      - uses: actions/checkout@v4

      - name: Build image for scanning
        run: docker build --platform linux/amd64 -t shoot-ai:scan .

      # Step 1 — fail the job on HIGH/CRITICAL CVEs (gating). MEDIUM is reported
      # only via SARIF upload below so the developer sees them in the Security
      # tab without blocking CI on noisy lower-severity findings.
      - name: Trivy container scan (gating — fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: "shoot-ai:scan"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "HIGH,CRITICAL"

      # Step 2 — always emit SARIF (even when the gating step failed) so every
      # finding lands in the GitHub Security tab for triage history.
      - name: Trivy container scan (SARIF report)
        if: always()
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: "shoot-ai:scan"
          format: "sarif"
          output: "trivy-results.sarif"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "MEDIUM,HIGH,CRITICAL"

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"
          category: "trivy-container"
